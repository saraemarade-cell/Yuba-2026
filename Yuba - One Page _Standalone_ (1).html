  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 }\n    50%{ opacity:.42; }\n  }\n  .hero-art .mark{ animation: mark-pulse 6s ease-in-out infinite; }\n  .hero-art .mark:nth-child(2){ animation-delay:-2s; }\n  .hero-art .mark:nth-child(3){ animation-delay:-4s; }\n\n    /* DNA background network */\n  .who-dna{ overflow: hidden; }\n  .dna-art{\n    position: absolute; inset: 0;\n    width: 100%; height: 100%;\n    pointer-events: none; z-index: 0;\n    overflow: hidden;\n  }\n  @keyframes net-pulse{\n    0%,100%{ opacity:.60; }\n    50%     { opacity:.32; }\n  }\n  .dna-art .net{ animation: net-pulse 14s ease-in-out infinite; }\n  @keyframes node-breathe{\n    0%,100%{ r:3.5; }\n    50%     { r:5.2; }\n  }\n  .dna-art .na{ animation: node-breathe 8s  ease-in-out infinite; }\n  .dna-art .nb{ animation: node-breathe 11s ease-in-out infinite; animation-delay:-5s; }\n  .dna-art .nc{ animation: node-breathe 9s  ease-in-out infinite; animation-delay:-3s; }\n\n  /* Footer converging art */\n  .contact{ overflow: hidden; }\n  .footer-art{\n    position: absolute; inset: 0;\n    width: 100%; height: 100%;\n    pointer-events: none; z-index: 0;\n  }\n  @keyframes fl-breathe{\n    0%,100%{ opacity:.65; }\n    50%     { opacity:1; }\n  }\n  .footer-art .fl{ animation: fl-breathe 10s ease-in-out infinite; }\n  .footer-art .fl:nth-child(2){ animation-delay:-3.3s; }\n  .footer-art .fl:nth-child(3){ animation-delay:-6.6s; }\n  @keyframes bloom-pulse{\n    0%,100%{ opacity:.12; }\n    50%     { opacity:.22; }\n  }\n  .footer-art .bloom{ animation: bloom-pulse 12s ease-in-out infinite; }\n  @keyframes dot-pulse{\n    0%,100%{ r:2.5; opacity:.40; }\n    50%     { r:3.8; opacity:.70; }\n  }\n  .footer-art .cdot{ animation: dot-pulse 8s ease-in-out infinite; }\n\n  /* Reduced motion: disable all art animations */\n  @media (prefers-reduced-motion: reduce){\n    .hero-art .blob-a,.hero-art .blob-b,.hero-art .blob-c,.hero-art .mark,\n    .dna-art .net,.dna-art .na,.dna-art .nb,.dna-art .nc,\n    .footer-art .fl,.footer-art .bloom,.footer-art .cdot\n    { animation: none !important; }\n  }\n\n  /* \u2550\u2550\u2550 EVENTI REEL \u2014 real images \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n  .eventi-frame .eventi-img-wrap{\n    position: relative;\n    width: 100%; height: 100%;\n    overflow: hidden;\n    border-radius: inherit;\n  }\n  .eventi-frame .eventi-img-wrap img{\n    display: block;\n    width: 100%; height: 100%;\n    object-fit: cover;\n    object-position: center;\n    transition: transform .7s cubic-bezier(.25,.46,.45,.94);\n  }\n  .eventi-frame:hover .eventi-img-wrap img{\n    transform: scale(1.06);\n  }\n  .eventi-overlay{\n    position: absolute; inset: 0;\n    background: linear-gradient(\n      180deg,\n      rgba(4,3,18,0) 40%,\n      rgba(4,3,18,0.55) 100%\n    );\n    pointer-events: none;\n    transition: opacity .4s ease;\n  }\n  .eventi-frame:hover .eventi-overlay{\n    opacity: 0.7;\n  }\n\n\n  /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     CINEMATIC ATMOSPHERE \u2014 extending Hero depth\n     \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n\n  /* \u2500\u2500 Section transition: fade-in from above \u2500\u2500 */\n  .block{\n    background-clip: padding-box;\n  }\n  .blocks,\n  .who-story,\n  .who-imgs,\n  .who-dna,\n  .clients,\n  .group,\n  .contact{\n    border-top-color: transparent;\n  }\n  .blocks::before,\n  .who-story::before,\n  .who-imgs::before,\n  .who-dna::before,\n  .clients::before,\n  .group::before,\n  .contact::before{\n    content:\"\";\n    position: absolute; top: 0; left: 0; right: 0;\n    height: 1px;\n    background: linear-gradient(90deg,\n      transparent 0%,\n      rgba(255,255,255,.07) 30%,\n      rgba(255,255,255,.10) 50%,\n      rgba(255,255,255,.07) 70%,\n      transparent 100%\n    );\n    pointer-events: none;\n    z-index: 1;\n  }\n\n  /* \u2500\u2500 WHO (YUBA manifesto) \u2014 deepen central atmosphere \u2500\u2500 */\n  .who{\n    background:\n      radial-gradient(ellipse 80% 60% at 50% 35%, rgba(6,1,119,.22) 0%, transparent 65%),\n      linear-gradient(180deg, rgba(6,1,119,.14) 0%, transparent 50%);\n  }\n\n  /* \u2500\u2500 BLOCKS (ecosistema) \u2014 cinematic depth from edges \u2500\u2500 */\n  .block.blocks{\n    background:\n      linear-gradient(120deg, rgba(6,1,119,.10) 0%, transparent 40%),\n      linear-gradient(240deg, rgba(4,3,18,.30) 0%, transparent 50%);\n    position: relative;\n  }\n  .block.blocks::after{\n    content:\"\";\n    position:absolute; inset:0;\n    background:\n      radial-gradient(ellipse 55% 40% at 85% 15%, rgba(6,1,119,.14) 0%, transparent 60%),\n      radial-gradient(ellipse 40% 30% at 8% 80%, rgba(4,3,18,.35) 0%, transparent 55%);\n    pointer-events:none; z-index:0;\n  }\n\n  /* \u2500\u2500 Block-card: layered atmospheric depth \u2500\u2500 */\n  .block-card{\n    background:\n      linear-gradient(160deg, rgba(6,5,40,.55) 0%, rgba(4,3,18,.75) 100%);\n    transition: background .4s ease;\n  }\n  .block-card:hover{\n    background:\n      linear-gradient(160deg, rgba(8,6,55,.65) 0%, rgba(4,3,18,.88) 100%);\n  }\n\n  /* \u2500\u2500 WHO-STORY \u2014 depth from lower-left \u2500\u2500 */\n  .who-story{\n    position: relative;\n    background:\n      radial-gradient(ellipse 65% 55% at 12% 80%, rgba(6,1,119,.14) 0%, transparent 65%),\n      radial-gradient(ellipse 40% 30% at 88% 18%, rgba(91,194,252,.03) 0%, transparent 60%);\n  }\n\n  /* \u2500\u2500 WHO-IMGS \u2014 cinematic side vignette \u2500\u2500 */\n  .who-imgs{\n    position: relative;\n    background:\n      linear-gradient(90deg,\n        rgba(4,3,18,.20) 0%,\n        transparent 18%,\n        transparent 82%,\n        rgba(4,3,18,.20) 100%\n      );\n  }\n\n  /* \u2500\u2500 WHO-DNA \u2014 deepen top and bottom \u2500\u2500 */\n  .who-dna{\n    background:\n      linear-gradient(180deg,\n        rgba(4,3,18,.20) 0%,\n        rgba(6,1,119,.10) 20%,\n        transparent 50%,\n        rgba(4,3,18,.18) 100%\n      );\n  }\n\n  /* \u2500\u2500 CLIENTS \u2014 richer notte base with cinematic glow \u2500\u2500 */\n  .clients{\n    background:\n      radial-gradient(ellipse 70% 55% at 50% 45%, rgba(6,1,119,.22) 0%, transparent 65%),\n      var(--notte);\n  }\n\n  /* \u2500\u2500 GROUP \u2014 editorial depth from top-right \u2500\u2500 */\n  .group{\n    background-image:\n      linear-gradient(180deg,\n        rgba(4,3,18,0.72) 0%,\n        rgba(4,3,18,0.52) 28%,\n        rgba(4,3,18,0.48) 55%,\n        rgba(4,3,18,0.68) 78%,\n        rgba(4,3,18,0.88) 100%\n      ),\n      linear-gradient(90deg,\n        rgba(4,3,18,0.45) 0%,\n        rgba(4,3,18,0.10) 30%,\n        rgba(4,3,18,0.10) 70%,\n        rgba(4,3,18,0.40) 100%\n      ),\n      url(\"PYREX_HD_ADSTREAMProres.00_00_07_20.Immagine007-1024x576-1.jpg\");\n    background-size: cover;\n    background-position: center 35%;\n    background-repeat: no-repeat;\n  }\n  @media (max-width: 768px){\n    .group{ background-position: 60% 30%; }\n  }\n\n  /* \u2500\u2500 CONTACT \u2014 deepest cinematic convergence \u2500\u2500 */\n  .contact{\n    background:\n      radial-gradient(ellipse 65% 50% at 50% 40%, rgba(6,1,119,.22) 0%, transparent 65%),\n      linear-gradient(180deg, rgba(4,3,18,.30) 0%, transparent 30%, rgba(4,3,18,.15) 100%);\n  }\n\n  /* \u2500\u2500 Shared ambient azure glow on section labels \u2500\u2500 */\n  .sec-label .bar{\n    box-shadow: 0 0 8px rgba(91,194,252,.25);\n  }\n\n  /* \u2500\u2500 Story-grid cinematic depth \u2500\u2500 */\n  .story-grid{\n    position: relative;\n  }\n  .story-grid::before{\n    content:\"\";\n    position:absolute; inset:0;\n    background:\n      radial-gradient(ellipse 55% 45% at 80% 50%, rgba(6,1,119,.10) 0%, transparent 65%);\n    pointer-events:none; z-index:0;\n  }\n\n  /* \u2500\u2500 Group members: subtle card depth \u2500\u2500 */\n  .group .person,\n  .group .member{\n    background: rgba(6,5,40,.45);\n    border: 1px solid rgba(255,255,255,.06);\n    border-radius: 4px;\n    transition: background .35s ease, border-color .35s ease;\n  }\n  .group .person:hover,\n  .group .member:hover{\n    background: rgba(10,8,55,.60);\n    border-color: rgba(91,194,252,.12);\n  }\n\n  /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     CINEMATIC ATMOSPHERE \u2014 fuchsia \u00b7 violet \u00b7 warm-yellow\n     Subtle ambient light inspired by the Hero palette\n     \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n\n  :root{\n    --fuchsia: rgba(210, 28, 130, 1);\n    --violet:  rgba(108, 32, 210, 1);\n    --yellow:  rgba(218, 152, 14, 1);\n    /* Atmospheric (very low opacity) */\n    --atmo-f:  rgba(210, 28, 130, 0.08);\n    --atmo-v:  rgba(108, 32, 210, 0.10);\n    --atmo-y:  rgba(218, 152, 14, 0.07);\n    --atmo-fv: rgba(160, 30, 170, 0.09);  /* fuchsia-violet blend */\n  }\n\n  /* \u2500\u2500 WHO (manifesto): violet center + fuchsia far-right whisper \u2500\u2500 */\n  .who{\n    background:\n      radial-gradient(ellipse 65% 50% at 90% 15%, var(--atmo-f) 0%, transparent 62%),\n      radial-gradient(ellipse 75% 58% at 50% 36%, rgba(6,1,119,.20) 0%, transparent 66%),\n      radial-gradient(ellipse 40% 32% at 14% 82%, var(--atmo-v) 0%, transparent 55%),\n      linear-gradient(180deg, rgba(6,1,119,.12) 0%, transparent 50%);\n  }\n\n  /* \u2500\u2500 BLOCKS (ecosistema): warm yellow top-right, violet bottom-left \u2500\u2500 */\n  .block.blocks{\n    background:\n      radial-gradient(ellipse 52% 42% at 88% 10%, var(--atmo-y) 0%, transparent 58%),\n      radial-gradient(ellipse 38% 30% at 6% 88%, var(--atmo-v) 0%, transparent 52%),\n      linear-gradient(120deg, rgba(6,1,119,.08) 0%, transparent 42%);\n  }\n  .block.blocks::after{\n    content:\"\";\n    position:absolute; inset:0;\n    background:\n      radial-gradient(ellipse 45% 35% at 78% 85%, var(--atmo-fv) 0%, transparent 55%);\n    pointer-events:none; z-index:0;\n  }\n\n  /* \u2500\u2500 Block-card: depth + faint fuchsia inner glow on hover \u2500\u2500 */\n  .block-card{\n    background: linear-gradient(160deg, rgba(6,5,40,.55) 0%, rgba(4,3,18,.75) 100%);\n    box-shadow: inset 0 1px 0 rgba(255,255,255,.05), 0 1px 0 rgba(0,0,0,.25);\n    transition: background .4s ease, box-shadow .4s ease;\n  }\n  .block-card:hover{\n    background: linear-gradient(160deg, rgba(8,6,55,.68) 0%, rgba(4,3,18,.90) 100%);\n    box-shadow:\n      inset 0 1px 0 rgba(210,28,130,.08),\n      inset 0 0 0 1px rgba(210,28,130,.05),\n      0 2px 28px rgba(4,3,18,.45);\n  }\n\n  /* \u2500\u2500 WHO-STORY: fuchsia atmospheric bleed over DSC3328 bg \u2500\u2500 */\n  .who-story{\n    background-image:\n      radial-gradient(ellipse 55% 42% at 85% 20%, rgba(210,28,130,0.12) 0%, transparent 58%),\n      radial-gradient(ellipse 40% 35% at 12% 75%, rgba(108,32,210,0.10) 0%, transparent 52%),\n      linear-gradient(180deg, rgba(4,3,18,0.82) 0%, rgba(4,3,18,0.62) 38%,\n                      rgba(4,3,18,0.70) 70%, rgba(4,3,18,0.92) 100%),\n      linear-gradient(90deg, rgba(4,3,18,0.28) 0%, transparent 42%, rgba(4,3,18,0.18) 100%),\n      url(\"DSC3328-Modifica-1024x574-1.png\");\n    background-size: cover;\n    background-position: center 40%;\n    background-repeat: no-repeat;\n  }\n\n  /* \u2500\u2500 WHO-IMGS (archivio visivo): violet left + warm yellow right \u2500\u2500 */\n  .who-imgs{\n    position: relative;\n    background:\n      radial-gradient(ellipse 45% 55% at 4% 50%, var(--atmo-v) 0%, transparent 55%),\n      radial-gradient(ellipse 45% 55% at 96% 50%, var(--atmo-y) 0%, transparent 55%),\n      linear-gradient(90deg, rgba(4,3,18,.18) 0%, transparent 18%, transparent 82%, rgba(4,3,18,.18) 100%);\n  }\n\n  /* \u2500\u2500 WHO-DNA: warm yellow bokeh + violet depth \u2500\u2500 */\n  .who-dna{\n    background:\n      radial-gradient(ellipse 55% 42% at 80% 22%, var(--atmo-y) 0%, transparent 55%),\n      radial-gradient(ellipse 42% 35% at 18% 72%, var(--atmo-v) 0%, transparent 50%),\n      linear-gradient(180deg, rgba(4,3,18,.18) 0%, rgba(6,1,119,.10) 22%, transparent 55%, rgba(4,3,18,.18) 100%);\n  }\n  .dna-art .na{ fill: rgba(218,152,14,0.30); }\n  .dna-art .nc{ fill: rgba(108,32,210,0.28); }\n\n  /* \u2500\u2500 CLIENTS: violet deep center + fuchsia far edge \u2500\u2500 */\n  .clients{\n    background:\n      radial-gradient(ellipse 42% 35% at 12% 18%, var(--atmo-f) 0%, transparent 55%),\n      radial-gradient(ellipse 70% 55% at 50% 48%, rgba(6,1,119,.22) 0%, transparent 66%),\n      radial-gradient(ellipse 38% 30% at 88% 82%, var(--atmo-v) 0%, transparent 52%),\n      var(--notte);\n  }\n\n  /* .group atmosphere folded into main rule */\n\n  /* \u2500\u2500 CONTACT: violet + fuchsia converge toward center \u2500\u2500 */\n  .contact{\n    background:\n      radial-gradient(ellipse 48% 38% at 22% 30%, var(--atmo-v) 0%, transparent 55%),\n      radial-gradient(ellipse 42% 35% at 78% 65%, var(--atmo-f) 0%, transparent 52%),\n      radial-gradient(ellipse 65% 50% at 50% 42%, rgba(6,1,119,.22) 0%, transparent 65%),\n      linear-gradient(180deg, rgba(4,3,18,.28) 0%, transparent 30%, rgba(4,3,18,.15) 100%);\n  }\n\n  /* \u2500\u2500 Section dividers: warm iridescent shimmer (yellow\u2192violet\u2192fuchsia) \u2500\u2500 */\n  .blocks::before,\n  .who-story::before,\n  .who-imgs::before,\n  .who-dna::before,\n  .clients::before,\n  .group::before,\n  .contact::before{\n    background: linear-gradient(90deg,\n      transparent 0%,\n      rgba(218,152,14,.07) 20%,\n      rgba(108,32,210,.10) 42%,\n      rgba(210,28,130,.09) 50%,\n      rgba(108,32,210,.10) 58%,\n      rgba(218,152,14,.07) 80%,\n      transparent 100%\n    );\n  }\n\n  /* \u2500\u2500 Story-grid container: ensure z-index above bg \u2500\u2500 */\n  .who-story .story-grid{ position:relative; z-index:2; }\n\n  /* \u2500\u2500 Group: cinematic image frame \u2500\u2500 */\n  .group-img-wrap{\n    position: relative;\n    margin-top: clamp(40px, 6vh, 72px);\n    border-radius: 4px;\n    overflow: hidden;\n    aspect-ratio: 16 / 9;\n    max-height: 60vh;\n  }\n  .group-img-wrap img{\n    display: block;\n    width: 100%; height: 100%;\n    object-fit: cover;\n    object-position: center 30%;\n    transition: transform .8s cubic-bezier(.25,.46,.45,.94);\n  }\n  .group-img-wrap:hover img{\n    transform: scale(1.03);\n  }\n  .group-img-overlay{\n    position: absolute; inset: 0;\n    background:\n      linear-gradient(180deg,\n        rgba(4,3,18,0.08) 0%,\n        rgba(4,3,18,0.12) 55%,\n        rgba(4,3,18,0.55) 85%,\n        rgba(4,3,18,0.78) 100%\n      ),\n      linear-gradient(90deg,\n        rgba(4,3,18,0.22) 0%,\n        transparent 25%,\n        transparent 75%,\n        rgba(4,3,18,0.18) 100%\n      );\n    pointer-events: none;\n  }\n  @media (max-width: 768px){\n    .group-img-wrap{ aspect-ratio: 4 / 3; max-height: none; }\n    .group-img-wrap img{ ================================== */\n  /* ==========  SECTION DIVIDER (wave-rule) ============= */\n  /* ===================================================== */\n\n\n  /* ===================================================== */\n  /* ==========  SEC-LABEL \u2014 wavy accent bar ============= */\n  /* ===================================================== */\n  .sec-label .bar{\n    flex: 0 0 64px;\n    height: 10px;\n    background: transparent;\n    background-image: url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 10' preserveAspectRatio='none'><path d='M0 5 Q 8 0 16 5 T 32 5 T 48 5 T 64 5' fill='none' stroke='%23C8FF00' stroke-width='1.1' stroke-linecap='round'/></svg>\");\n    background-repeat: repeat-x;\n    background-size: 64px 10px;\n    opacity: .85;\n    animation: secLabelFlow 5s linear infinite;\n  }\n  @keyframes secLabelFlow{\n    from{ background-position: 0 50%; }\n    to{   background-position: 64px 50%; }\n  }\n\n  /* ===================================================== */\n  /* ==========  RIPPLE \u2014 click on CTAs/chips ============ */\n  /* ===================================================== */\n  .nav ul .cta,\n  .bc-cta,\n  .chip,\n  .contact a.cta-mail,\n  .contact .cta-pill,\n  button[type=\"submit\"]{\n    position: relative;\n    overflow: hidden;\n  }\n  .wave-ripple{\n    position: absolute;\n    left: var(--rx, 50%);\n    top: var(--ry, 50%);\n    width: 0; height: 0;\n    border-radius: 50%;\n    border: 1.4px solid currentColor;\n    color: var(--lime);\n    transform: translate(-50%, -50%);\n    pointer-events: none;\n    opacity: .7;\n    animation: rippleOut .9s cubic-bezier(.18,.7,.2,1) forwards;\n    mix-blend-mode: screen;\n  }\n  .wave-ripple.r2{ animation-delay: .12s; opacity:.5; }\n  .wave-ripple.r3{ animation-delay: .24s; opacity:.35; }\n  @keyframes rippleOut{\n    0%   { width: 0;     height: 0;     opacity: .7; }\n    100% { width: 260px; height: 260px; opacity: 0; }\n  }\n\n  /* ===================================================== */\n  /* ==========  STATS \u2014 wave underline on hover ========= */\n  /* ===================================================== */\n  .stats .s{ position: relative; }\n  .stats .s .big{ position: relative; display: inline-block; padding-bottom: 8px; }\n  .stats .s .big::after{\n    content: \"\";\n    position: absolute;\n    left: 0; right: 0; bottom: 0;\n    height: 8px;\n    background-image: url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 8' preserveAspectRatio='none'><path d='M0 4 Q 10 0 20 4 T 40 4 T 60 4 T 80 4' fill='none' stroke='%23C8FF00' stroke-width='1.2' stroke-linecap='round'/></svg>\");\n    background-repeat: repeat-x;\n    background-size: 80px 8px;\n    background-position: 0 50%;\n    opacity: 0;\n    transform: translateY(6px);\n    transition: opacity .45s ease, transform .45s ease;\n  }\n  .stats .s:hover .big::after,\n  .stats .s:focus-within .big::after{\n    opacity: .95;\n    transform: translateY(0);\n    animation: secLabelFlow 4.5s linear infinite;\n  }\n\n  /* ===================================================== */\n  /* ==========  CURSOR WAVE GLYPH \u2014 follows mouse ======= */\n  /* ===================================================== */\n  .cursor-wave{\n    position: fixed;\n    left: 0; top: 0;\n    width: 56px; height: 56px;\n    pointer-events: none;\n    z-index: 49;\n    transform: translate3d(var(--cx, -200px), var(--cy, -200px), 0) translate(-50%, -50%) scale(var(--cs, .6));\n    opacity: 0;\n    transition: opacity .35s ease, transform .14s linear;\n    mix-blend-mode: screen;\n  }\n  .cursor-wave.is-active{ opacity: .9; }\n  .cursor-wave svg{ width: 100%; height: 100%; overflow: visible; }\n  .cursor-wave path{ fill:none; stroke: var(--lime); stroke-width: 1; }\n  .cursor-wave .ring{\n    transform-origin: center;\n    animation: cwRing 2.4s ease-in-out infinite;\n  }\n  .cursor-wave .ring.b{ animation-delay: -.8s; }\n  .cursor-wave .ring.c{ animation-delay: -1.6s; }\n  @keyframes cwRing{\n    0%   { transform: scale(.4); opacity: .9; }\n    100% { transform: scale(1.3); opacity: 0; }\n  }\n  @media (hover: none) { .cursor-wave{ display: none; } }\n\n  /* ===================================================== */\n  /* ==========  CARD DEPTH \u2014 block-card tilt cue ======== */\n  /* ===================================================== */\n  .block-card{\n    transition: transform .5s cubic-bezier(.2,.7,.2,1), box-shadow .5s ease;\n  }\n  .block-card:hover{\n    transform: translateY(-2px);\n    box-shadow: 0 30px 60px -30px rgba(0,0,0,.55), 0 1px 0 rgba(232,228,220,.06) inset;\n  }\n  /* Gentle floating glyph in card corner */\n  .block-card .bc-glyph{\n    position: absolute;\n    right: clamp(20px, 3vw, 40px);\n    top: clamp(20px, 3vw, 40px);\n    width: 64px; height: 24px;\n    z-index: 2;\n    pointer-events: none;\n    opacity: .55;\n    transition: opacity .35s ease, transform .35s ease;\n  }\n  .block-card:hover .bc-glyph{ opacity: 1; transform: translateY(-2px); }\n  .block-card .bc-glyph svg{ width: 100%; height: 100%; overflow: visible; }\n  .block-card .bc-glyph path{ fill: none; stroke: currentColor; stroke-width: 1.1; stroke-linecap: round; color: var(--c2, var(--lime)); }\n  .block-card .bc-glyph .b{ opacity: .5; }\n\n  /* ===================================================== */\n  /* ==========  Z-INDEX FIXES for new layers ============ */\n  /* ===================================================== */\n  .container, section.block .container,\n  section.block > .container,\n  section.block > article,\n  section.block > .blocks-foot,\n  section.block > footer,\n  footer.block .container{ position: relative; z-index: 2; }\n\n  @media (prefers-reduced-motion: reduce){\n    .ambient .orb,\n    .sec-label .bar,\n    .stats .s .big::after,\n    .cursor-wave .ring{ animation: none !important; }\n  }\n</style>\n</head>\n<body>\n\n\n\n<!-- AMBIENT ORBS \u2014 atmospheric dep " y1=\"0\" x2=\"6\" y2=\"0\" stroke=\"white\" stroke-width=\"0.7\"/>\n      <line x1=\"0\" y1=\"-6\" x2=\"0\" y2=\"6\" stroke=\"white\" stroke-width=\"0.7\"/>\n    </g>\n    <line x1=\"443\" y1=\"284\" x2=\"478\" y2=\"299\" stroke=\"rgba(255,255,255,0.08)\" stroke-width=\"0.8\"/>\n    <line x1=\"960\" y1=\"536\" x2=\"995\" y2=\"550\" stroke=\"rgba(91,194,252,0.10)\" stroke-width=\"0.7\"/>\n    <path d=\"M600,206 Q720,126 840,206\" stroke=\"rgba(255,255,255,0.055)\" stroke-width=\"0.9\" fill=\"none\"/>\n    <path d=\"M856,644 Q978,564 1100,644\" stroke=\"rgba(91,194,252,0.075)\" stroke-width=\"0.9\" fill=\"none\"/>\n  </g>\n</svg>\n  <div class=\"hero-visual\" aria-hidden=\"true\">\n    <svg viewBox=\"0 0 1440 900\" preserveAspectRatio=\"xMidYMid slice\" xmlns=\"http://www.w3.org/2000/svg\">\n      <defs>\n        <radialGradient id=\"hgGlow1\" cx=\"75%\" cy=\"25%\" r=\"45%\">\n          <stop offset=\"0%\" stop-color=\"#E0F7FF\" stop-opacity=\"0.12\"/>\n          <stop offset=\"100%\" stop-color=\"#E0F7FF\" stop-opacity=\"0\"/>\n        </radialGradient>\n        <radialGradient id=\"hgGlow2\" cx=\"15%\" cy=\"78%\" r=\"38%\">\n          <stop offset=\"0%\" stop-color=\"#060177\" stop-opacity=\"0.55\"/>\n          <stop offset=\"100%\" stop-color=\"#060177\" stop-opacity=\"0\"/>\n        </radialGradient>\n        <linearGradient id=\"arcGrad\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\">\n          <stop offset=\"0%\" stop-color=\"#E0F7FF\" stop-opacity=\"0\"/>\n          <stop offset=\"35%\" stop-color=\"#E0F7FF\" stop-opacity=\"0.25\"/>\n          <stop offset=\"65%\" stop-color=\"#E0F7FF\" stop-opacity=\"0.25\"/>\n          <stop offset=\"100%\" stop-color=\"#E0F7FF\" stop-opacity=\"0\"/>\n        </linearGradient>\n      </defs>\n      <circle cx=\"1080\" cy=\"200\" r=\"400\" fill=\"url(#hgGlow1)\"/>\n      <circle cx=\"200\" cy=\"680\" r=\"300\" fill=\"url(#hgGlow2)\"/>\n      <g class=\"arc-grp-1\">\n        <path fill=\"none\" d=\"M -60 520 C 200 380, 480 620, 760 480 S 1180 340, 1500 500\"\n              stroke=\"url(#arcGrad)\" stroke-width=\"1\" opacity=\"0.6\"/>\n        <path fill=\"none\" d=\"M -60 550 C 200 410, 480 650, 760 510 S 1180 370, 1500 530\"\n              stroke=\"url(#arcGrad)\" stroke-width=\"0.5\" opacity=\"0.3\"/>\n      </g>\n    </svg>\n  </div>\n  \n<div class=\"container hero-claim\">\n    <div class=\"hero-kw-label\">L'ecosistema creativo</div>\n    <h1>\n      <span class=\"word\">Generiamo</span>\n      <span class=\"word italic\">Connettiamo</span>\n      <span class=\"word\">Trasformiamo</span>\n    </h1>\n  </div>\n\n  <div class=\"container hero-bottom\">\n    <div class=\"hero-id\">\n      <strong>Yuba Srl</strong>\n      Ecosistema Creativo\n    </div>\n    <p class=\"hero-lede\">\n      <strong>Holding creativa.</strong> La mente strategica che d\u00e0 vita a tre realt\u00e0 autonome \u2014\n      <em>comunicazione, eventi, innovazione</em> \u2014 connesse da un'unica visione generativa.\n    </p>\n    <div class=\"scroll-cue\">\n      <span>Scorri</span>\n      <span class=\"line\"></span>\n    </div>\n  </div>\n</header>\n\n<!-- CHI \u00c8 YUBA -->\n<section class=\"block who\" id=\"manifesto\">\n  <div class=\"container\">\n    <div class=\"sec-label\">\n      <span class=\"num\">01</span><span class=\"bar\"></span>\n      <span>Chi \u00e8 Yuba</span>\n    </div>\n\n    <!-- Brand monolith -->\n    <div class=\"monolith\">\n      <h2 class=\"brand-name\" aria-label=\"Yuba\">\n        <span class=\"ch\" data-letter=\"Y\" tabindex=\"0\">Y</span><span class=\"ch\" data-letter=\"U\" tabindex=\"0\">U</span><span class=\"ch\" data-letter=\"B\" tabindex=\"0\">B</span><span class=\"ch\" data-letter=\"A\" tabindex=\"0\">A</span>\n      </h2>\n\n      <div class=\"brand-meta\">\n      </div>\n    </div>\n\n    <!-- Dictionary entry -->\n    <div class=\"dict\">\n      <div class=\"dict-head\">\n        <div class=\"word\">yuba</div>\n        <div class=\"phon\">/\u02c8ju\u02d0ba/</div>\n        <div class=\"dict-holding\">Holding creativa</div>\n      </div>\n      <ol class=\"meanings\">\n        <div class=\"meanings-hint\">Passa il mouse su una lettera</div>\n        <li data-letter=\"Y\" tabindex=\"0\">\n          <span class=\"m-letter\">Y<sub>Yuba</sub></span>\n          <div class=\"m-text\">Mente strategica che <em>genera</em> ecosistemi creativi. La radice, il nome, l'origine.</div>\n        </li>\n        <li data-letter=\"U\" tabindex=\"0\">\n          <span class=\"m-letter\">U<sub>Unica</sub></span>\n          <div class=\"m-text\">Una <strong>visione</strong> che connette tre realt\u00e0 autonome \u2014 <em>comunicazione, eventi, innovazione</em>.</div>\n        </li>\n        <li data-letter=\"B\" tabindex=\"0\">\n          <span class=\"m-letter\">B<sub>Brand</sub></span>\n          <div class=\"m-text\">Lavoriamo per <strong>brand premium</strong> che hanno smesso di chiedersi <em>cosa</em> e iniziato a chiedersi <em>perch\u00e9</em>.</div>\n        </li>\n        <li data-letter=\"A\" tabindex=\"0\">\n          <span class=\"m-letter\">A<sub>A&nbsp;monte</sub></span>\n          <div class=\"m-text\">Il pensiero che sta <em>a monte</em> di ogni progetto. Mai l'output, sempre la causa.</div>\n        </li>\n      </ol>\n    </div>\n  </div>\n</section>\n\n<!-- BLOCCHI -->\n<section class=\"block blocks\" id=\"blocchi\">\n  <div class=\"container\">\n    <div class=\"head\">\n      <div class=\"sec-label\"><span class=\"num\">02</span><span class=\"bar\"></span><span>L'Ecosistema</span></div>\n      <div class=\"head-inner\">\n        <h2 class=\"reveal\">Tre blocchi.<br>Un'unica visione.</h2>\n        <p class=\"reveal d1\">\n          Tre aree operative distinte, ognuna con la propria identit\u00e0,\n          il proprio target, i propri output. Stesso DNA,\n          tre espressioni diverse.\n        </p>\n      </div>\n    </div>\n\n        <article class=\"block-card\" data-block=\"innov\" tabindex=\"0\">\n      <div class=\"bc-text\">\n        <div class=\"bc-top\">\n          <div class=\"num\">03 / Innovation</div>\n          <a class=\"bc-arrow\" href=\"https://innovation.yuba.it\" target=\"_blank\" rel=\"noopener\" aria-label=\"Vai alla sezione Innovation\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 12h14M13 6l6 6-6 6\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path></svg>\n          </a>\n        </div>\n        <div class=\"ent\"><span class=\"swatch\"></span>Business Consulting</div>\n        <h3>Pensiero sistemico<br>per l'impresa.</h3>\n        <p>Innovation management e consulenza strategica per aziende strutturate che vogliono evolvere, non solo crescere. Modelli di business, trasformazione organizzativa, ecosistemi aziendali.</p>\n        <ul>\n          <li>Innovation Manager in-azienda</li>\n          <li>Modelli di business &amp; trasformazione</li>\n          <li>Ecosistemi aziendali esterni</li>\n          <li>Business Angel su realt\u00e0 selezionate</li>\n        </ul>\n        <a class=\"bc-cta\" href=\"https://innovation.yuba.it\" target=\"_blank\" rel=\"noopener\" aria-label=\"Esplora Yuba Innovation\">\n          <span>Esplora Yuba Innovation</span>\n          <span class=\"arr\" aria-hidden=\"true\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M7 17L17 7M9 7h8v8\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path></svg>\n          </span>\n          <span class=\"ext\">innovation.yuba.it</span>\n        </a>\n      </div>\n      <div class=\"bc-imgs innov-grid\">\n        <div class=\"cell\" data-cell=\"0\">\n          <div class=\"label\">01 \u00b7 Modello</div>\n          <image-slot id=\"innov-1\" shape=\"rect\" placeholder=\"Business model\"></image-slot>\n        </div>\n        <div class=\"cell\" data-cell=\"1\">\n          <div class=\"label\">02 \u00b7 Processo</div>\n          <image-slot id=\"innov-2\" shape=\"rect\" placeholder=\"Process map\"></image-slot>\n        </div>\n        <div class=\"cell\" data-cell=\"2\">\n          <div class=\"label\">03 \u00b7 Team</div>\n          <image-slot id=\"innov-3\" shape=\"rect\" placeholder=\"Leadership team\"></image-slot>\n        </div>\n        <div class=\"cell\" data-cell=\"3\">\n          <div class=\"label\">04 \u00b7 Ecosistema</div>\n          <image-slot id=\"innov-4\" shape=\"rect\" placeholder=\"Network map\"></image-slot>\n        </div>\n      </div>\n    </article>\n\n    <article class=\"block-card\" data-block=\"estro\" tabindex=\"0\">\n      <div class=\"bc-text\">\n        <div class=\"bc-top\">\n          <div class=\"num\">01 / Comunicazione</div>\n          <a class=\"bc-arrow\" href=\"https://estro.agency\" target=\"_blank\" rel=\"noopener\" aria-label=\"Vai a Estro Agency\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 12h14M13 6l6 6-6 6\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path></svg>\n          </a>\n        </div>\n        <div class=\"ent\"><span class=\"swatch\"></span>Estro Agency</div>\n        <h3>Strategico \u2014<br>Creativo.</h3>\n        <p>Brand strategy, web marketing e storytelling digitale. Progetti che lasciano il segno \u2014 con la leggerezza di chi si diverte a farlo.</p>\n        <ul>\n          <li>Brand identity &amp; posizionamento</li>\n          <li>Web marketing &amp; digital strategy</li>\n          <li>Content &amp; storytelling</li>\n          <li>Creators &amp; storytellers digitali</li>\n        </ul>\n        <a class=\"bc-cta\" href=\"https://estro.agency\" target=\"_blank\" rel=\"noopener\" aria-label=\"Visita Estro Agency\">\n          <span>Visita Estro Agency</span>\n          <span class=\"arr\" aria-hidden=\"true\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M7 17L17 7M9 7h8v8\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path></svg>\n          </span>\n          <span class=\"ext\">estro.agency</span>\n        </a>\n      </div>\n      <div class=\"bc-imgs estro-photos\">\n        <div class=\"photo p1\"><image-slot id=\"estro-1\" shape=\"rounded\" radius=\"4\" placeholder=\"Campaign visual\"></image-slot></div>\n        <div class=\"photo p2\"><image-slot id=\"estro-2\" shape=\"rounded\" radius=\"4\" placeholder=\"Brand asset\"></image-slot></div>\n        <div class=\"photo p3\"><image-slot id=\"estro-3\" shape=\"rounded\" radius=\"4\" placeholder=\"Creator content\"></image-slot></div>\n        <div class=\"photo p4\"><image-slot id=\"estro-4\" shape=\"rounded\" radius=\"4\" placeholder=\"Digital story\"></image-slot></div>\n      </div>\n    </article>\n\n        <article class=\"block-card\" data-block=\"eventi\" tabindex=\"0\">\n      <div class=\"bc-text\">\n        <div class=\"bc-top\">\n          <div class=\"num\">02 / Eventi &amp; Spettacolo</div>\n          <a class=\"bc-arrow\" href=\"https://eventi.yuba.it\" target=\"_blank\" rel=\"noopener\" aria-label=\"Vai alla sezione Eventi\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 12h14M13 6l6 6-6 6\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path></svg>\n          </a>\n        </div>\n        <div class=\"ent\"><span class=\"swatch\"></span>Produzione &amp; Live</div>\n        <h3>Grandi produzioni<br>dal vivo.</h3>\n        <p>Festival musicali, format nazionali, pubblico spettacolo. Dalla visione alla realizzazione \u2014 oltre 10 anni di esperienza con Red Bull, RAI, Spotify, TEDx.</p>\n        <ul>\n          <li>Produzione eventi 360\u00b0</li>\n          <li>Festival &amp; format nazionali</li>\n          <li>Service tecnico \u2014 palco, audio, luci</li>\n          <li>Format proprietari</li>\n        </ul>\n        <a class=\"bc-cta\" href=\"https://eventi.yuba.it\" target=\"_blank\" rel=\"noopener\" aria-label=\"Scopri Yuba Eventi\">\n          <span>Scopri Yuba Eventi</span>\n          <span class=\"arr\" aria-hidden=\"true\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M7 17L17 7M9 7h8v8\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path></svg>\n          </span>\n          <span class=\"ext\">eventi.yuba.it</span>\n        </a>\n      </div>\n      <div class=\"bc-imgs eventi-reel\">\n        <div class=\"reel\">\n          <div class=\"frame eventi-frame\"><div class=\"eventi-img-wrap\"><img src=\"assets/MI-AMI.webp\" alt=\"MI AMI Festival\" loading=\"lazy\" decoding=\"async\"><div class=\"eventi-overlay\"></div></div><div class=\"ts\">MI AMI Festival</div></div>\n          <div class=\"frame eventi-frame\"><div class=\"eventi-img-wrap\"><img src=\"assets/MARCO-MENGONI.webp\" alt=\"Marco Mengoni\" loading=\"lazy\" decoding=\"async\"><div class=\"eventi-overlay\"></div></div><div class=\"ts\">Marco Mengoni</div></div>\n          <div class=\"frame eventi-frame\"><div class=\"eventi-img-wrap\"><img src=\"assets/SAN-SIRO-OLIMPIADI.webp\" alt=\"San Siro \u00b7 Olimpiadi\" loading=\"lazy\" decoding=\"async\"><div class=\"eventi-overlay\"></div></div><div class=\"ts\">San Siro \u00b7 Olimpiadi</div></div>\n          <div class=\"frame eventi-frame\"><div class=\"eventi-img-wrap\"><img src=\"assets/TAME-IMPALA.webp\" alt=\"Tame Impala\" loading=\"lazy\" decoding=\"async\"><div class=\"eventi-overlay\"></div></div><div class=\"ts\">Tame Impala</div></div>\n          <div class=\"frame eventi-frame\"><div class=\"eventi-img-wrap\"><img src=\"assets/WOODOO.webp\" alt=\"WOODOO\" loading=\"lazy\" decoding=\"async\"><div class=\"eventi-overlay\"></div></div><div class=\"ts\">WOODOO</div></div>\n          <div class=\"frame eventi-frame\"><div class=\"eventi-img-wrap\"><img src=\"assets/AZIMUTH.webp\" alt=\"AZIMUTH\" loading=\"lazy\" decoding=\"async\"><div class=\"eventi-overlay\"></div></div><div class=\"ts\">AZIMUTH</div></div>\n        </div>\n      </div>\n    </article>\n  </div>\n</section>\n\n\n<!-- STORIA -->\n<section class=\"block who-story\">\n  <div class=\"container\">\n    <!-- Storytelling -->\n    <div class=\"story-grid\">\n      <div class=\"story\">\n        <p>Nasce nel <strong>2014</strong> a Milano con un'idea precisa: <em>la creativit\u00e0, se ben governata, diventa sistema</em>.</p>\n        <p>Inizia come agenzia operativa. Evolve in struttura generatrice di ecosistemi distinti. Oggi \u00e8 una <strong>holding di tre realt\u00e0</strong> che coesistono sotto un'unica visione strategica.</p>\n        <p>Lavoriamo per brand premium e organizzazioni complesse che hanno smesso di chiedersi <span class=\"pop\">cosa</span> fare e hanno cominciato a chiedersi <span class=\"pop\">perch\u00e9</span>.</p>\n      </div>\n\n      <div class=\"story-stats\">\n        <div class=\"stat\"><div class=\"big\">2014</div><div class=\"lbl\">Established \u00b7 Milano</div></div>\n        <div class=\"stat\"><div class=\"big\">12+</div><div class=\"lbl\">Anni di velocit\u00e0</div></div>\n        <div class=\"stat\"><div class=\"big\">120+</div><div class=\"lbl\">Brand servite</div></div>\n        <div class=\"stat\"><div class=\"big\">3</div><div class=\"lbl\">Ecosistemi attivi</div></div>\n      </div>\n    </div>\n  </div>\n</section>\n\n\n<!-- IMMAGINI -->\n<section class=\"block who-imgs\">\n  <div class=\"container\">\n    <!-- Evocative imagery \u2014 contact-sheet composition -->\n    <div class=\"story-imgs\">\n\n      <!-- Vertical chapter axis -->\n      <div class=\"si-axis\" aria-hidden=\"true\">\n        <span class=\"ax-dot\"></span>\n        <span class=\"ax-tick\"></span>\n        <span class=\"ax-label\">Immagini</span>\n        <span class=\"ax-tick\"></span>\n      </div>\n\n      <div class=\"si-strip\" aria-hidden=\"true\">\n        <div class=\"l\">\n          <span>Archivio visivo</span>\n          <span class=\"seg\"></span>\n          <span>Yuba \u00b7 s=\"values-grid\">\n      <div class=\"vg-label\"><span class=\"bar\"></span><span>Il DNA</span></div>\n      <div class=\"v-list\">\n        <div class=\"v\" tabindex=\"0\">\n          <div class=\"n\">\u2192 01</div>\n          <div class=\"name\">Innovazione</div>\n          <div class=\"desc\">Guardare avanti. Sperimentare. Non replicare mai ci\u00f2 che esiste.</div>\n          <div class=\"hint\">Hover</div>\n        </div>\n        <div class=\"v\" tabindex=\"0\">\n          <div class=\"n\">\u2192 02</div>\n          <div class=\"name\">Ecosistema</div>\n          <div class=\"desc\">Le parti si connettono, si alimentano, crescono insieme. La somma \u00e8 sempre maggiore.</div>\n          <div class=\"hint\">Hover</div>\n        </div>\n        <div class=\"v\" tabindex=\"0\">\n          <div class=\"n\">\u2192 03</div>\n          <div class=\"name\">Strategia</div>\n          <div class=\"desc\">L'intuizione guidata dalla visione. Mai il contrario.</div>\n          <div class=\"hint\">Hover</div>\n        </div>\n        <div class=\"v\" tabindex=\"0\">\n          <div class=\"n\">\u2192 04</div>\n          <div class=\"name\">Emozione</div>\n          <div class=\"desc\">Arrivare alle persone, non solo comunicare a loro. Il dato come sottoprodotto.</div>\n          <div class=\"hint\">Hover</div>\n        </div>\n        <div class=\"v\" tabindex=\"0\">\n          <div class=\"n\">\u2192 05</div>\n          <div class=\"name\">Competenza</div>\n          <div class=\"desc\">Dietro ogni progetto, un team d'eccellenza. Senza scorciatoie.</div>\n          <div class=\"hint\">Hover</div>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- CLIENTI -->\n<section class=\"block clients\" id=\"clienti\">\n  <div class=\"container\">\n    <div class=\"sec-label\"><span class=\"num\">03</span><span class=\"bar\"></span><span>Loro hanno scelto Yuba</span></div>\n    <h2 class=\"reveal\">I brand <span class=\"accent\">che muovono</span> la cultura contemporanea.</h2>\n    <div class=\"count reveal d1\">\n      <span><b>120+</b> clienti</span>\n      <span><b>12</b> anni di lavoro</span>\n      <span><b>3</b> continenti</span>\n    </div>\n\n    <div class=\"client-filter\" role=\"tablist\" aria-label=\"Filtra clienti per categoria\">\n      <button class=\"chip\" type=\"button\" data-cat=\"all\" aria-pressed=\"true\">\n        <span>Tutti</span><span class=\"n\">27</span>\n      </button>\n      <button class=\"chip\" type=\"button\" data-cat=\"fashion\" aria-pressed=\"false\">\n        <span class=\"dot\" aria-hidden=\"true\"></span><span>Fashion &amp; Luxury</span><span class=\"n\">05</span>\n      </button>\n      <button class=\"chip\" type=\"button\" data-cat=\"auto\" aria-pressed=\"false\">\n        <span class=\"dot\" aria-hidden=\"true\"></span><span>Automotive &amp; Sport</span><span class=\"n\">05</span>\n      </button>\n      <button class=\"chip\" type=\"button\" data-cat=\"media\" aria-pressed=\"false\">\n        <span class=\"dot\" aria-hidden=\"true\"></span><span>Media &amp; Cultura</span><span class=\"n\">05</span>\n      </button>\n      <button class=\"chip\" type=\"button\" data-cat=\"corp\" aria-pressed=\"false\">\n        <span class=\"dot\" aria-hidden=\"true\"></span><span>Corporate</span><span class=\"n\">05</span>\n      </button>\n      <button class=\"chip\" type=\"button\" data-cat=\"life\" aria-pressed=\"false\">\n        <span class=\"dot\" aria-hidden=\"true\"></span><span>Lifestyle</span><span class=\"n\">05</span>\n      </button>\n      <button class=\"chip\" type=\"button\" data-cat=\"health\" aria-pressed=\"false\">\n        <span class=\"dot\" aria-hidden=\"true\"></span><span>Healthcare &amp; Education</span><span class=\"n\">02</span>\n      </button>\n    </div>\n  </div>\n\n  <div class=\"marquee\" aria-hidden=\"true\">\n    <div class=\"marquee-track\" id=\"mq1\"></div>\n  </div>\n  <div class=\"marquee rev\" aria-hidden=\"true\">\n    <div class=\"marquee-track\" id=\"mq2\"></div>\n  </div>\n\n  <div class=\"container\">\n    <div class=\"client-meta\">\n      <span class=\"live\"><span class=\"pulse\"></span>Network attivo</span>\n      <span class=\"sep\">\u2014</span>\n      <span><b class=\"cnt-visible\">27</b> brand visibili</span>\n      <span class=\"sep\">\u2014</span>\n      <span><b>120+</b> progetti dal 2014</span>\n    </div>\n  </div>\n</section>\n\n<!-- GRUPPO -->\n<section class=\"block group\" id=\"gruppo\">\n  <div class=\"container\">\n    <div class=\"grid\">\n      <div>\n        <div class=\"sec-label\"><span class=\"num\">04</span><span class=\"bar\"></span><span>Il Gruppo</span></div>\n        <h2 class=\"reveal\">Persone <em>prima</em> di processi.</h2>\n      </div>\n      <div class=\"copy reveal d1\">\n        <p>\n          Dietro Yuba c'\u00e8 un gruppo di persone che ha scelto di non costruire un'altra agenzia.\n          Founders, strategist, registi di eventi, innovation manager, creativi digitali \u2014\n          tutti convinti che la creativit\u00e0, se ben governata, diventi sistema.\n        </p>\n        <p>\n          Lavoriamo per brand premium e organizzazioni complesse che hanno smesso di chiedersi\n          <em>cosa</em> fare e hanno cominciato a chiedersi <em>perch\u00e9</em>.\n        </p>\n\n        <div class=\"stats\">\n          <div class=\"s reveal\"><div class=\"big\">12+</div><div class=\"label\">Anni d'esperienza</div></div>\n          <div class=\"s reveal d1\"><div class=\"big\">120+</div><div class=\"label\">Clienti serviti</div></div>\n          <div class=\"s reveal d2\"><div class=\"big\">300+</div><div class=\"label\">Eventi prodotti</div></div>\n          <div class=\"s reveal d3\"><div class=\"big\">3</div><div class=\"label\">Ecosistemi attivi</div></div>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- CONTACT -->\n<footer class=\"block contact\" id=\"contatti\">\n  <svg class=\"footer-art\" viewBox=\"0 0 1440 700\" preserveAspectRatio=\"x " fill=\"rgba(91,194,252,0.18)\"/>\n  </svg>\n  <div class=\"container\">\n    <div class=\"sec-label\"><span class=\"num\">05</span><span class=\"bar\"></span><span>Contatti</span></div>\n    <h2 class=\"reveal\">Entra<br>nell'<em>ecosistema</em>.</h2>\n    <a href=\"mailto:hello@yuba.it\" class=\"mail reveal d1\">hello@yuba.it \u2192</a>\n\n    <div class=\"contact-grid\">\n      <div class=\"col\">\n        <h4>Sede</h4>\n        <p>Via dei Generatori, 14<br>20121 Milano (MI)<br>Italia</p>\n      </div>\n      <div class=\"col\">\n        <h4>Generale</h4>\n        <p>\n          <a href=\"mailto:hello@yuba.it\">hello@yuba.it</a><br>\n          <a href=\"tel:+390200000000\">+39 02 0000 0000</a>\n        </p>\n      </div>\n      <div class=\"col\">\n        <h4>I Blocchi</h4>\n        <ul>\n          <li><a href=\"#\">Estro Agency \u2197</a></li>\n          <li><a href=\"#\">Eventi &amp; Spettacolo \u2197</a></li>\n          <li><a href=\"#\">Innovation Consulting \u2197</a></li>\n        </ul>\n      </div>\n      <div class=\"col\">\n        <h4>Social</h4>\n        <ul>\n          <li><a href=\"#\">Instagram \u2197</a></li>\n          <li><a href=\"#\">LinkedIn \u2197</a></li>\n          <li><a href=\"#\">Vimeo \u2197</a></li>\n        </ul>\n      </div>\n    </div>\n\n    <div class=\"legal\">\n      <span>\u00a9 2026 Yuba Srl \u2014 P.IVA 0000000000</span>\n      <span>Holding Creativa \u00b7 Milano</span>\n      <span><a href=\"#\">Privacy</a> \u00b7 <a href=\"#\">Cookie</a> \u00b7 <a href=\"#\">Credits</a></span>\n    </div>\n  </div>\n</footer>\n\n<script src=\"7168e1d2-3ba0-4ae3-8229-4badabe4ae65\"><\/script>\n<script>\n  // Nav scroll style\n  const nav = document.getElementById('nav');\n  const onScroll = () => nav.classList.toggle('scrolled', window.scrollY > 30);\n  window.addEventListener('scroll', onScroll, { passive: true });\n  onScroll();\n\n  // Reveal on scroll\n  const io = new IntersectionObserver((entries) => {\n    for (const e of entries) {\n      if (e.isIntersecting) {\n        e.target.classList.add('in');\n        io.unobserve(e.target);\n      }\n    }\n  }, { rootMargin: '0px 0px -8% 0px', threshold: 0.05 });\n  document.querySelectorAll('.reveal').forEach(el => io.observe(el));\n\n  // Hero entry \u2014 words slide up; wave is static (always visible)\n  window.addEventListener('load', () => {\n    setTimeout(() => {\n      document.querySelectorAll('.hero-claim h1 .word').forEach(w => w.classList.add('anim'));\n      requestAnimationFrame(() => {\n        document.querySelector('.hero-claim h1')?.classList.add('in');\n      });\n    }, 50);\n  });\n\n  // Marquee content \u2014 brand database with categories\n  const ALL_BRANDS = [\n    {n:'Prada',                cat:'fashion', f:true},\n    {n:'Gucci',                cat:'fashion', f:true},\n    {n:'Miu Miu',              cat:'fashion'},\n    {n:'Cartier',              cat:'fashion', f:true},\n    {n:'Pandora',              cat:'fashion'},\n    {n:'Tonino Lamborghini',   cat:'auto'},\n    {n:'Kawasaki',             cat:'auto'},\n    {n:'Aprilia',              cat:'auto'},\n    {n:'Moto Guzzi',           cat:'auto'},\n    {n:'SEAT / Cupra',         cat:'auto'},\n    {n:'Red Bull',             cat:'media',   f:true},\n    {n:'Spotify',              cat:'media',   f:true},\n    {n:'RAI',                  cat:'media'},\n    {n:'TEDx',                 cat:'media'},\n    {n:'Cond\u00e9 Nast',           cat:'media'},\n    {n:'Accenture',            cat:'corp'},\n    {n:'RE/MAX',               cat:'corp'},\n    {n:'Star7',                cat:'corp'},\n    {n:'Elmec',                cat:'corp'},\n    {n:'Fanuc',                cat:'corp'},\n    {n:'Patagonia',            cat:'life',    f:true},\n    {n:'Biorepair',            cat:'life'},\n    {n:'Pyrex',                cat:'life'},\n    {n:'Terranova',            cat:'life'},\n    {n:'Coswell / Plenitude',  cat:'life'},\n    {n:'Humanitas',            cat:'health'},\n    {n:'Bocconi',              cat:'health', f:true}\n  ];\n\n  function fillMarquee(id, items){\n    const track = document.getElementById(id);\n    if (!track) return;\n    if (!items.length){ track.innerHTML = ''; return; }\n    const itemHTML = (i, dup) => `<div class=\"marquee-item${dup?' dup':''}${i.f?' featured':''} is-match\" data-cat=\"${i.cat||''}\"><span class=\"mq-dot\" aria-hidden=\"true\"></span>${i.n}</div>`;\n    const orig = items.map(i => itemHTML(i, false)).join('');\n    const dup  = items.map(i => itemHTML(i, true)).join('');\n    track.innerHTML = orig + dup;\n  }\n\n  function renderMarquees(){\n    // Render once with ALL brands, alternating into two rows for the seamless loop\n    const row1 = ALL_BRANDS.filter((_,i) => i % 2 === 0);\n    const row2 = ALL_BRANDS.filter((_,i) => i % 2 === 1);\n    fillMarquee('mq1', row1);\n    fillMarquee('mq2', row2);\n  }\n  renderMarquees();\n\n  function applyFilter(cat){\n    const section = document.querySelector('.clients');\n    if (!section) return;\n    const isFiltered = cat !== 'all';\n    section.classList.toggle('is-filtered', isFiltered);\n    section.dataset.cat = cat;\n\n    if (isFiltered){\n      // Consolidate all matching items into mq1 so they sit on the same row\n      // and only wrap when they truly don't fit.\n      const track1 = document.getElementById('mq1');\n      const track2 = document.getElementById('mq2');\n      if (track1 && track2){\n        // Move every item from track2 into track1 (skipping marquee duplicates)\n        [...track2.querySelectorAll('.marquee-item')].forEach(el => {\n          if (el.classList.contains('dup')) { el.remove(); return; }\n          track1.appendChild(el);\n        });\n        // Remove any duplicate (marquee clone) items from track1 too\n        [...track1.querySelectorAll('.marquee-item.dup')].forEach(el => el.remove());\n      }\n      document.querySelectorAll('.marquee-item').forEach(el => {\n        el.classList.toggle('is-match', el.dataset.cat === cat);\n      });\n    } else {\n      // Restore original split + seamless-loop duplicates\n      renderMarquees();\n      document.querySelectorAll('.marquee-item').forEach(el => {\n        el.classList.add('is-match');\n      });\n    }\n\n    const cnt = document.querySelector('.client-meta .cnt-visible');\n    if (cnt) cnt.textContent = isFiltered ? ALL_BRANDS.filter(b => b.cat === cat).length : ALL_BRANDS.length;\n  }\n\n  // Filter chip handlers\n  (function(){\n    const chips = document.querySelectorAll('.client-filter .chip');\n    if (!chips.length) return;\n    chips.forEach(chip => {\n      chip.addEventListener('click', () => {\n        const cat = chip.dataset.cat;\n        chips.forEach(c => c.setAttribute('aria-pressed', c === chip ? 'true' : 'false'));\n        applyFilter(cat);\n      });\n    });\n  })();\n\n  // Eventi reel: clone frames for seamless loop\n  (() => {\n    const reel = document.querySelector('.eventi-reel .reel');\n    if (!reel) return;\n    [...reel.children].forEach(f => {\n      const clone = f.cloneNode(true);\n      clone.setAttribute('aria-hidden', 'true');\n      reel.appendChild(clone);\n    });\n  })();\n\n  // Innov grid: cycle active cell\n  (() => {\n    const cells = document.querySelectorAll('.innov-grid .cell');\n    if (!cells.length) return;\n    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {\n      cells[0].classList.add('active'); return;\n    }\n    let i = 0;\n    cells[i].classList.add('active');\n    setInterval(() => {\n      cells[i].classList.remove('active');\n      i = (i + 1) % cells.length;\n      cells[i].classList.add('active');\n    }, 2600);\n  })();\n\n  // Smooth scroll\n  document.querySelectorAll('a[href^=\"#\"]').forEach(a => {\n    a.addEventListener('click', (e) => {\n      const id = a.getAttribute('href');\n      if (id.length < 2) return;\n      const target = document.querySelector(id);\n      if (target) {\n        e.preventDefault();\n        const top = target.getBoundingClientRect().top + window.scrollY - 12;\n        window.scrollTo({ top, behavior: 'smooth' });\n      }\n    });\n  });\n\n  // Hero wave: interactive morph (mouse + gentle oscillation)\n  (() => {\n    const heroEl = document.querySelector('.hero');\n    const traces = document.querySelectorAll('.hero-wave .wt');\n    if (!heroEl || !traces.length) return;\n\n    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n    const target = { x: 0, y: 0 };\n    const smooth = { x: 0, y: 0 };\n    let t = 0;\n\n    // Default cubic-bezier control points\n    const BASE = {\n      sx: -80,  sy: 380,\n      c1x: 260, c1y: 540,\n      c2x: 520, c2y: 120,\n      mx:  880, my:  280,\n      c3x: 1340,c3y: 540,\n      ex:  1700,ey:  320,\n    };\n\n    function buildPath(dy){\n      const amp   = 1 + smooth.y * 0.55;\n      const phase = smooth.x * 90;\n      const osc   = reduceMotion ? 0 : Math.sin(t) * 9;\n      const oscR  = reduceMotion ? 0 : Math.cos(t * 0.7) * 6;\n\n      const sy  = BASE.sy + dy;\n      const c1y = BASE.sy + (BASE.c1y - BASE.sy) * amp + osc + dy;\n      const c2y = BASE.sy + (BASE.c2y - BASE.sy) * amp - osc + dy;\n      const my  = BASE.my + oscR + dy;\n      const c3y = BASE.sy + (BASE.c3y - BASE.sy) * amp - osc + dy;\n      const ey  = BASE.ey + oscR + dy;\n\n      return `M ${BASE.sx} ${sy}`\n           + ` C ${BASE.c1x + phase} ${c1y}, ${BASE.c2x + phase} ${c2y}, ${BASE.mx + phase * 0.3} ${my}`\n           + ` S ${BASE.c3x - phase} ${c3y}, ${BASE.ex} ${ey}`;\n    }\n\n    function update(){\n      traces.forEach(p => {\n        const dy = +p.dataset.y;\n        p.setAttribute('d', buildPath(dy));\n      });\n    }\n\n    function tick(){\n      t += 0.012;\n      smooth.x += (target.x - smooth.x) * 0.06;\n      smooth.y += (target.y - smooth.y) * 0.06;\n      update();\n      requestAnimationFrame(tick);\n    }\n\n    heroEl.addEventListener('mousemove', (e) => {\n      const r = heroEl.getBoundingClientRect();\n      target.x = ((e.clientX - r.left) / r.width)  - 0.5;\n      target.y = ((e.clientY - r.top)  / r.height) - 0.5;\n    }, { passive: true });\n\n    heroEl.addEventListener('mouseleave', () => {\n      target.x = 0; target.y = 0;\n    });\n\n    heroEl.addEventListener('touchmove', (e) => {\n      const touch = e.touches[0]; if (!touch) return;\n      const r = heroEl.getBoundingClientRect();\n      target.x = ((touch.clientX - r.left) / r.width)  - 0.5;\n      target.y = ((touch.clientY - r.top)  / r.height) - 0.5;\n    }, { passive: true });\n\n    // Initial draw\n    update();\n    if (!reduceMotion) requestAnimationFrame(tick);\n  })();\n\n  /* ===== YUBA letter \u2194 meaning sync ===== */\n  (function(){\n    const letters = document.querySelectorAll('.brand-name .ch[data-letter]');\n    const items   = document.querySelectorAll('.meanings li[data-letter]');\n    const list    = document.querySelector('.meanings');\n    if (!letters.length || !items.length || !list) return;\n\n    const setActive = (letter) => {\n      list.classList.toggle('has-active', !!letter);\n      letters.forEach(el => el.classList.toggle('is-active', el.dataset.letter === letter));\n      items.forEach(el => el.classList.toggle('is-active', el.dataset.letter === letter));\n    };\n    const clear = () => setActive(null);\n\n    [...letters, ...items].forEach(el => {\n      const L = el.dataset.letter;\n      el.addEventListener('mouseenter', () => setActive(L));\n      el.addEventListener('mouseleave', clear);\n      el.addEventListener('focus',      () => setActive(L));\n      el.addEventListener('blur',       clear);\n    });\n  })();\n\n  /* ============================================================ */\n  /* ====  AMBIENT ORB PARALLAX \u2014 mouse-driven depth  =========== */\n  /* ============================================================ */\n  (() => {\n    const amb = document.querySelector('.ambient');\n    if (!amb) return;\n    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;\n    const orbs = amb.querySelectorAll('.orb');\n    const depths = [60, 38, 24, 48]; // per orb parallax strength\n    let tx = 0, ty = 0, cx = 0, cy = 0, raf = 0;\n\n    function onMove(e){\n      tx = (e.clientX / window.innerWidth)  - 0.5;\n      ty = (e.clientY / window.innerHeight) - 0.5;\n      if (!raf) raf = requestAnimationFrame(tick);\n    }\n    function tick(){\n      cx += (tx - cx) * 0.08;\n      cy += (ty - cy) * 0.08;\n      orbs.forEach((o, i) => {\n        const d = depths[i] || 30;\n        o.style.setProperty('--tx', (cx * d) + 'px');\n        o.style.setProperty('--ty', (cy * d) + 'px');\n      });\n      if (Math.abs(tx - cx) > 0.001 || Math.abs(ty - cy) > 0.001){\n        raf = requestAnimationFrame(tick);\n      } else {\n        raf = 0;\n      }\n    }\n    window.addEventListener('mousemove', onMove, { passive: true });\n  })();\n\n  /* Wave dividers removed */\n\n  /* ============================================================ */\n  /* ====  RIPPLE on click for CTAs / chips  ==================== */\n  /* ============================================================ */\n  (() => {\n    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;\n    const sel = '.nav ul .cta, .bc-cta, .chip, .contact a.cta-mail, .contact .cta-pill, button[type=\"submit\"]';\n    document.addEventListener('click', (e) => {\n      const t = e.target.closest(sel);\n      if (!t) return;\n      const r = t.getBoundingClientRect();\n      const x = e.clientX - r.left;\n      const y = e.clientY - r.top;\n      [0,1,2].forEach(i => {\n        const ring = document.createElement('span');\n        ring.className = 'wave-ripple' + (i === 1 ? ' r2' : i === 2 ? ' r3' : '');\n        ring.style.setProperty('--rx', x + 'px');\n        ring.style.setProperty('--ry', y + 'px');\n        t.appendChild(ring);\n        setTimeout(() => ring.remove(), 1100);\n      });\n    });\n  })();\n\n  /* ============================================================ */\n  /* ====  CURSOR WAVE \u2014 follows cursor on interactive els ====== */\n  /* ============================================================ */\n  (() => {\n    const cw = document.querySelector('.cursor-wave');\n    if (!cw) return;\n    if (window.matchMedia('(hover: none)').matches) return;\n    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;\n    const sel = 'a, button, .chip, .block-card, .marquee-item, [data-cat]';\n    let active = false;\n    document.addEventListener('mousemove', (e) => {\n      cw.style.setProperty('--cx', e.clientX + 'px');\n      cw.style.setProperty('--cy', e.clientY + 'px');\n    }, { passive: true });\n    document.addEventListener('mouseover', (e) => {\n      const t = e.target.closest(sel);\n      if (t && !active){\n        cw.classList.add('is-active');\n        cw.style.setProperty('--cs', '1');\n        active = true;\n      }\n    });\n    document.addEventListener('mouseout', (e) => {\n      const t = e.target.closest(sel);\n      if (t && !e.relatedTarget?.closest?.(sel)){\n        cw.classList.remove('is-active');\n        cw.style.setProperty('--cs', '.6');\n        active = false;\n      }\n    });\n  })();\n\n  /* ============================================================ */\n  /* ====  BLOCK-CARD glyph injection (decorative wave)  ======== */\n  /* ============================================================ */\n  (() => {\n    const cards = document.querySelectorAll('.block-card');\n    if (!cards.length) return;\n    const glyph = `\n      <svg viewBox=\"0 0 64 24\" preserveAspectRatio=\"none\">\n        <path class=\"a\" d=\"M0 12 Q 8 2 16 12 T 32 12 T 48 12 T 64 12\"/>\n        <path class=\"b\" d=\"M0 18 Q 8 8 16 18 T 32 18 T 48 18 T 64 18\"/>\n      </svg>`;\n    cards.forEach(c => {\n      if (c.querySelector('.bc-glyph')) return;\n      const div = document.createElement('div');\n      div.className = 'bc-glyph';\n      div.setAttribute('aria-hidden', 'true');\n      div.innerHTML = glyph;\n      c.appendChild(div);\n    });\n  })();\n<\/script>\n\n\n\n  <script>\n  (function(){\n    if(!window.matchMedia('(prefers-reduced-motion: no-preference)').matches) return;\n    var ticking=false, mx=0, my=0, far=null, near=null;\n    function init(){\n      far  = document.querySelector('.hero-art .par-far');\n      near = document.querySelector('.hero-art .par-near');\n    }\n    function tick(){\n      ticking=false;\n      if(!far||!near) return;\n      var dx=(mx-innerWidth/2)/innerWidth;\n      var dy=(my-innerHeight/2)/innerHeight;\n      far.style.transform  = 'translate('+( dx*-8 )+'px,'+(dy*-5)+'px)';\n      near.style.transform = 'translate('+( dx*-16)+'px,'+(dy*-10)+'px)';\n    }\n    document.addEventListener('DOMContentLoaded', init);\n    document.addEventListener('mousemove', function(e){\n      mx=e.clientX; my=e.clientY;\n      if(!ticking){ requestAnimationFrame(tick); ticking=true; }\n    }, {passive:true});\n  })();\n  <\/script>\n</body></html>"</script>
